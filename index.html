<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل صيدليات المداومة - تيزنيt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <style>
        body { background-color: #0f172a; font-family: sans-serif; color: white; }
        .glass-card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- العنوان -->
    <header class="text-center my-12">
        <div class="bg-emerald-500 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-emerald-500/30">
            <i class="fas fa-plus-medical text-3xl"></i>
        </div>
        <h1 class="text-3xl font-bold">صيدلية الحراسة</h1>
        <p class="text-emerald-400">تيزنيت - Tiznit</p>
        <p id="current-date" class="text-slate-400 mt-2 text-sm italic"></p>
    </header>

    <!-- بطاقة الصيدلية -->
    <main class="w-full max-w-md glass-card rounded-[2rem] p-8 shadow-2xl">
        <div class="text-center mb-8">
            <span class="bg-emerald-500/20 text-emerald-400 px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest">الحراسة الليلة</span>
            <h2 id="pharmacy-name" class="text-3xl font-bold mt-4 text-white">...</h2>
            <p class="text-slate-400 mt-2 flex items-center justify-center gap-2">
                <i class="fas fa-location-dot"></i> تيزنيت، المغرب
            </p>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <a id="btn-call" href="#" class="flex flex-col items-center bg-slate-800 p-5 rounded-3xl hover:bg-emerald-600 transition-all">
                <i class="fas fa-phone-alt text-xl mb-2"></i>
                <span class="font-bold">اتصال</span>
            </a>
            <a id="btn-map" href="#" target="_blank" class="flex flex-col items-center bg-slate-800 p-5 rounded-3xl hover:bg-blue-600 transition-all">
                <i class="fas fa-route text-xl mb-2"></i>
                <span class="font-bold">الموقع</span>
            </a>
        </div>
    </main>

    <footer class="mt-auto py-8 text-slate-500 text-xs text-center">
        تحديث يدوي - تأكد دائماً من الاتصال قبل التنقل
    </footer>

    <script src="script.js"></script>
</body>
</html>
